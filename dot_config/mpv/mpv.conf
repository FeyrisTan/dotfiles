[Standard-Audio-PC]
af=
audio-channels=stereo
audio-spdif=no

[Cinema-Virtual-7.1]
af=
audio-channels=stereo
audio-spdif=no

[Cinema-Spatial-Pure]
af=
audio-channels=stereo
audio-spdif=no

# =========================================================
# PLATFORM CORE (Always Active - Loads API & IPC)
# =========================================================

vo=gpu-next
gpu-api=auto
gpu-context=auto
fbo-format=rgba16f
hwdec=auto


# --- DEFAULT SETTINGS (Global) ---
[default]
volume-max=200
# OSD Appearance
--osd-bar=no
--osd-level=1
--osd-font='Noto Sans'
--osd-color="#FFFFFF00"
--osd-border-color="#FF000000"
--osd-border-size=1.2
--osd-font-size=28
--osd-shadow-offset=1
--osd-shadow-color="#7F000000"
--osd-bold=no
--osd-back-color=0/0/0/0.5
--osd-border-style=outline-and-shadow
--osd-on-seek=msg

reset-on-next-file=vf,video-zoom,speed
hr-seek-framedrop=no
hwdec-codecs=all
demuxer-thread=yes
save-position-on-quit=yes
save-watch-history=yes
fullscreen=yes
no-border
autofit-larger=100%x95%
osc=no
input-cursor=yes
msg-level=ffmpeg/video=no
watch-later-options-remove=vf
watch-later-options-remove=video-scale-x
watch-later-options-remove=video-scale-y
watch-later-options-remove=video-aspect-override
watch-later-options-remove=video-crop

# Windows Desktop Paths
screenshot-template='~~/screenshots/%F (%P) %n'
watch-later-directory='~~/watch_later'
gpu-shader-cache-dir=~~/cache/shaders
icc-cache-dir=~~/cache/icc

########################################
# CACHE & PERFORMANCE
########################################

[cache]
profile-cond=demuxer_via_network
cache=yes
cache-pause=yes
cache-secs=300
demuxer-max-bytes=1024MiB
demuxer-max-back-bytes=1024MiB

# Network resilience for unstable streams
stream-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_delay_max=5

[default]
#############
# Subtitles #
#############
demuxer-mkv-subtitle-preroll=yes
demuxer-mkv-subtitle-preroll-secs=2
sub-auto=fuzzy
sub-file-paths-append=ass:srt:sub:subs:subtitles
embeddedfonts=yes
sub-fix-timing=no
sub-use-margins=yes
sub-ass-force-margins=yes
sub-ass-override=yes
sub-ass-style-overrides=blur=1
sub-ass-use-video-data=all
blend-subtitles=no
sub-gauss=0.9
sub-blur=0.9
sub-gray=yes
sub-scale-with-window=yes
sub-font="Source Sans Pro Semibold"
sub-font-size=36
sub-color="#FFFFFFFF"
sub-border-color="#FF262626"
sub-shadow-color="#33262626"
#sub-border-size=3
sub-shadow-offset=3
sub-spacing=0.5
sub-pos=100
image-subs-video-resolution=yes
stretch-image-subs-to-screen=yes

# =========================================
# WEB STREAM & SUBTITLE FIXES
# =========================================

# 1. Force yt-dlp to select best video/audio and to download ALL available subtitles
ytdl-format=bestvideo[height<=?2160][fps<=?60]+bestaudio/best
#ytdl-raw-options=format="bestvideo+bestaudio/best",audio-quality=0
ytdl-raw-options=extractor-args="youtube:player_client=default,-android_sdkless"
ytdl-raw-options-append=sub-lang=en,en-orig,te,tel,write-subs=,write-auto-subs=

#############
# Languages #
#############

slang=en,eng
alang=jpn,ja,jp,en,eng

################
# Video Output #
################
# Handled by platform profiles, but defaults are safe
dither-depth=auto
dither=fruit
temporal-dither=yes          		# Reduces visible dither patterns over time 
temporal-dither-period=1     		# Change pattern every frame (fastest cycling)
tone-mapping=spline
sigmoid-upscaling=yes				# Prevents ringing/aliasing artifacts during upscaling
linear-downscaling=no
correct-downscaling=yes
target-colorspace-hint=auto
target-prim=auto
target-trc=auto
target-peak=auto
target-contrast=auto
gamut-mapping-mode=auto
deband=no
deband-iterations=2
deband-threshold=35
deband-range=20
deband-grain=2

# --- Frame Timing ---
video-sync=audio
video-sync-max-video-change=0.01
interpolation=no
interpolation-preserve
tscale=box
tscale-window=quadric
tscale-radius=1.025
tscale-clamp=0.0
#tscale-blur=0.6991556596428412
deinterlace=auto
#icc-profile-auto

##################
# Color Settings #
##################

gamma=1.02
contrast=1.05
saturation=1.05
brightness=0.0

# --- Static Profiles ---

[High-Quality]
profile-desc=Live Action / Non-Anime (TV-like Upscaling)
scale=spline64
cscale=spline64
dscale=spline64
correct-downscaling=yes
dither-depth=auto
dither=fruit
deband=no
deband-iterations=2
deband-threshold=35
deband-range=20
deband-grain=5
glsl-shaders-clr
glsl-shaders-append="~~/shaders/FSRCNNX_x2_16-0-4-1.glsl"
glsl-shaders-append="~~/shaders/KrigBilateral.glsl"
glsl-shaders-append="~~/shaders/SSimSuperRes.glsl"
glsl-shaders-append="~~/shaders/SSimDownscaler.glsl"
glsl-shaders-append="~~/shaders/adaptive-sharpen-modern-1080p.glsl"

[HQ-SD-Clean]
