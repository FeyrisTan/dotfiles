dither-depth=auto
dither=fruit
scale=spline64
cscale=spline64
dscale=spline64
correct-downscaling=yes
glsl-shaders-clr
# We only use the sharpener. No FSRCNNX or NNEDI3 needed.
glsl-shaders-append="~~/shaders/SSimDownscaler.glsl"
glsl-shaders-append="~~/shaders/adaptive-sharpen-modern-4K.glsl"
msg-level=ffmpeg/video=no

[Low-End]
profile-desc="Battery Saver / Low End Mode"
vf=""
glsl-shaders-clr
scale=bilinear
cscale=bilinear
dscale=bilinear
dither-depth=no
correct-downscaling=no
linear-downscaling=no
sigmoid-upscaling=no
hdr-compute-peak=no
framedrop=vo

