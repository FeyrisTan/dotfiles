glsl-shaders-clr


# =========================================================
# 8K OPTIMIZATION STACK (Cross-Platform)
# =========================================================

# 1. BASE PROFILE (Called by Lua Script + Auto Trigger)
[8K-Optimized]
profile-cond=height > 2160 and p["current-tracks/video/image"] ~= true
profile-desc=8K Base Settings
profile-restore=copy
input-ipc-server=""
# Clear filters to allow Native Decoding (Critical)
vf=""
fs
# Reset to auto (Works for Linux/Vulkan)
hwdec=auto
vd-lavc-o=extra_hw_frames=16
vd-queue-enable=no
fbo-format=rgba16f
# Performance Settings
profile=high-quality
vo=gpu-next
deinterlace=no
linear-downscaling=no
glsl-shaders-clr
msg-level=ffmpeg/video=no

[8K-Windows-Patch]
profile-cond=platform == "windows" and height > 2160 and p["current-tracks/video/image"] ~= true
profile-desc=Force auto (No Copy)
hwdec=vulkan

# ===============================================
# AUDIO-ONLY PROFILES
# ===============================================

[Audio-Only]
profile-desc="Audio File Settings"

# Clear heavy video processing to save power
glsl-shaders-clr
vf=""
scale=bilinear
cscale=bilinear
dscale=bilinear
correct-downscaling=no
dither-depth=no
deband=no
hwdec=no
save-position-on-quit=no
save-watch-history=no
cache=no
gpu-shader-cache=no
resume-playback=no
watch-later-options-remove=all
reset-on-next-file=all

# Quality of life features for music
force-window=yes
# osd-playing-msg='🎵 Now Playing: ${media-title}'

# Allow mpv to naturally load the first embedded album cover
audio-display=embedded-first

# --- Extension Triggers ---
[extension.mp3]
profile=Audio-Only

[extension.flac]
profile=Audio-Only

[extension.wav]
profile=Audio-Only

[extension.m4a]
profile=Audio-Only

[extension.aac]
profile=Audio-Only

[extension.ac3]
profile=Audio-Only

[extension.eac3]
profile=Audio-Only

[extension.ogg]
profile=Audio-Only

[extension.opus]
profile=Audio-Only
