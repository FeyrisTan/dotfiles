scale=spline64
cscale=spline64
dscale=spline64
dither-depth=auto
dither=fruit
correct-downscaling=yes
deband=no
deband-iterations=2
deband-threshold=26
deband-range=16
deband-grain=10
vf=hqdn3d=0:0:4:4
