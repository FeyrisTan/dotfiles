[anime-shaders]
profile-desc=Anime only (line art + clean gradients)
scale=ewa_lanczossharp
cscale=spline64
dscale=spline64
scale-antiring=0.6
scale-radius=3.142857
#scale-blur=1.05
dither-depth=auto
dither=fruit
deband=yes
deband-iterations=2
deband-threshold=64
deband-range=24
deband-grain=4

[4K-Native]
profile-desc=4K Content (No Upscaling)
