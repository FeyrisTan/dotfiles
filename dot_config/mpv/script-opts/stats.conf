# Core font settings
font=Noto Sans
font_mono=Noto Sans
font_size=21
border_size=1.2

# Color settings (Format: BBGGRR)
font_color=00FFFF
border_color=000000
shadow_color=000000

# Transparency (0 is opaque, 255 is fully transparent)
# Your "#7F000000" shadow is roughly 50% transparent (Hex 7F ≈ 127 Dec)
alpha=127

# Shadow offsets
shadow_x_offset=1
shadow_y_offset=1

# Style overrides
# stats.lua doesn't have a direct "bold=no" or "back-color" toggle 
# but uses its own internal styling table.
