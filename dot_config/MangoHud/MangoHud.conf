# Config Generated by MangoJuice - AMD GPU VRAM Only #
legacy_layout=false
blacklist=pamac-manager,lact,ghb,bitwig-studio,ptyxis,yumex

# GPU / CPU Stats
gpu_stats
gpu_load_change
vram
gpu_temp
gpu_junction_temp
cpu_stats
cpu_load_change
cpu_temp
ram
hdr
hud_compact
display_server
engine_short_names
winesync
fps
fps_color_change

# Controls
toggle_logging=Shift_L+F2
toggle_hud_position=Shift_R+F11
toggle_fps_limit=Shift_L+F1
toggle_hud=Shift_R+F12

# Output
output_folder=/home/gomi

# FPS / VSync
fps_limit=174
vsync=2
gl_vsync=1

# HUD Layout
horizontal
horizontal_stretch=0
background_alpha=0.0
position=top-left
table_columns=1

# GPU Settings
pci_dev=0000:03:00.0   # Only discrete AMD GPU
gpu_text=GPU
gpu_color=2e9762

# CPU / RAM / FPS Colors
cpu_text=CPU
cpu_color=2e97cb
fps_value=30,60
fps_color=b22222,fdfd09,39f900
gpu_load_value=50,90
gpu_load_color=ffffff,ffaa7f,cc0000
cpu_load_value=50,90
cpu_load_color=ffffff,ffaa7f,cc0000

# Background / HUD Colors
background_color=000000
frametime_color=00ff00
frametime=0
vram_color=ad64c1
ram_color=c26693
wine_color=eb5b5b
engine_color=eb5b5b
text_color=ffffff
media_player_color=ffffff
network_color=e07b85
battery_color=92e79a
horizontal_separator_color=ffffff

# Media Player Format
media_player_format={title};{artist};{album}
